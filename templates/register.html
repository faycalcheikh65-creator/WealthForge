{% extends "base.html" %}
{% block title %}التسجيل{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><h4>📝 إنشاء حساب</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="البريد الإلكتروني" required></div>
                    <div class="mb-3"><input type="text" name="phone" class="form-control" placeholder="رقم الهاتف (اختياري)"></div>
                    <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="كلمة المرور" required></div>
                    <div class="mb-3"><input type="password" name="confirm_password" class="form-control" placeholder="تأكيد كلمة المرور" required></div>
                    <div class="mb-3"><input type="text" name="referral_code" class="form-control" placeholder="كود الإحالة (اختياري)"></div>
                    <button type="submit" class="btn btn-success w-100">تسجيل</button>
                </form>
                <hr>
                <p class="text-center">لديك حساب؟ <a href="{{ url_for('login') }}">تسجيل الدخول</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
