{% extends "base.html" %}

{% block title %}نسيت كلمة المرور - WealthForge{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-key"></i> استعادة كلمة المرور</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-paper-plane"></i> إرسال رابط الاستعادة
                    </button>
                </form>
                <hr>
                <p class="text-center">
                    <a href="{{ url_for('login') }}">العودة إلى تسجيل الدخول</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
