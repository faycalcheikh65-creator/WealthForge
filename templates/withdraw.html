{% extends "base.html" %}
{% block title %}السحب{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><h4>💸 سحب USDT</h4></div>
            <div class="card-body">
                <div class="alert alert-info">
                    <strong>الرصيد المتاح:</strong> {{ "%.2f"|format(user.balance) }} USDT<br>
                    <strong>الحد الأدنى:</strong> 10 USDT
                </div>
                <form method="POST">
                    <div class="mb-3"><input type="number" step="0.01" name="amount" class="form-control" placeholder="المبلغ" min="10" max="{{ user.balance }}" required></div>
                    <div class="mb-3"><input type="text" name="wallet_address" class="form-control" placeholder="عنوان المحفظة (BEP20)" required></div>
                    <button type="submit" class="btn btn-warning w-100">📤 طلب السحب</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
