{% extends "base.html" %}
{% block title %}الإيداع{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><h4>💰 إيداع USDT</h4></div>
            <div class="card-body">
                <div class="alert alert-info">
                    <strong>العملة:</strong> USDT (BEP20)<br>
                    <strong>الحد الأدنى:</strong> 2 USDT<br>
                    <strong>عنوان الاستلام:</strong><br>
                    <code>{{ wallet }}</code>
                    <button class="btn btn-sm btn-secondary mt-2" onclick="navigator.clipboard.writeText('{{ wallet }}')">📋 نسخ</button>
                </div>
                <form method="POST">
                    <div class="mb-3"><input type="number" step="0.01" name="amount" class="form-control" placeholder="المبلغ" min="2" required></div>
                    <div class="mb-3"><input type="text" name="tx_hash" class="form-control" placeholder="رقم المعاملة (TXID)" required></div>
                    <button type="submit" class="btn btn-success w-100">📤 إرسال طلب الإيداع</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
