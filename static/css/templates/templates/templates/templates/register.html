{% extends "base.html" %}

{% block title %}التسجيل - WealthForge{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-user-plus"></i> إنشاء حساب جديد</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" name="email" class="form-control form-control-custom" 
                               placeholder="example@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">رقم الهاتف (اختياري)</label>
                        <input type="text" name="phone" class="form-control form-control-custom" 
                               placeholder="+213 5xxxxxxxx">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الاسم الكامل (اختياري)</label>
                        <input type="text" name="full_name" class="form-control form-control-custom" 
                               placeholder="أحمد محمد">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" name="password" class="form-control form-control-custom" 
                               placeholder="•••••••• (6 أحرف على الأقل)" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">تأكيد كلمة المرور</label>
                        <input type="password" name="confirm_password" class="form-control form-control-custom" 
                               placeholder="••••••••" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">كود الإحالة (اختياري)</label>
                        <input type="text" name="referral_code" class="form-control form-control-custom" 
                               placeholder="أدخل كود الإحالة إن وجد">
                    </div>
                    <button type="submit" class="btn btn-success-custom w-100">
                        <i class="fas fa-user-plus"></i> إنشاء حساب
                    </button>
                </form>
                <hr>
                <div class="text-center">
                    <p class="mb-0">
                        لديك حساب؟ <a href="{{ url_for('login') }}">تسجيل الدخول</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
