{% extends "base.html" %}

{% block title %}تسجيل الدخول - WealthForge{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" name="email" class="form-control form-control-custom" 
                               placeholder="example@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" name="password" class="form-control form-control-custom" 
                               placeholder="••••••••" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="remember" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">تذكرني</label>
                    </div>
                    <button type="submit" class="btn btn-success-custom w-100">
                        <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                    </button>
                </form>
                <hr>
                <div class="text-center">
                    <p class="mb-0">
                        ليس لديك حساب؟ <a href="{{ url_for('register') }}">سجل الآن</a>
                    </p>
                    <p class="mb-0">
                        <a href="{{ url_for('forgot_password') }}">نسيت كلمة المرور؟</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
